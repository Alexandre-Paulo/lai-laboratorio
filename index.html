<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAI Laboratório - Inteligência em RH</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #2d3748; --title: #1a365d; --border: #e2e8f0; --accent: #2b6cb0; --success: #38a169; }
        [data-theme="dark"] { --bg: #1a202c; --card: #2d3748; --text: #f7fafc; --title: #90cdf4; --border: #4a5568; --accent: #4299e1; }

        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }

        .navbar { width: 100%; background: var(--card); padding: 15px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: center; position: sticky; top: 0; z-index: 100; }
        .nav-content { width: 90%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; color: var(--title); cursor: pointer; font-size: 1.2rem; }

        #dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 90%; max-width: 1000px; padding: 40px 0; }
        .tool-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tool-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .tool-card span { font-size: 2.5rem; display: block; margin-bottom: 15px; }

        .tool-page { display: none; width: 95%; max-width: 700px; padding: 40px 0; }
        .container { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85em; color: var(--accent); text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: inherit; box-sizing: border-box; }
        .hidden-fields { display: none; background: rgba(43, 108, 176, 0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px dashed var(--accent); }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-pdf { background: var(--success); color: white; margin-top: 20px; display: none; }
        
        .resultado-area { margin-top: 30px; padding: 25px; border: 1px solid var(--border); display: none; line-height: 1.7; background: rgba(0,0,0,0.02); border-radius: 16px; }
        .back-btn { margin-bottom: 20px; cursor: pointer; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body data-theme="light">

    <div class="navbar">
        <div class="nav-content">
            <div class="logo" onclick="showPage('dashboard')">LAI LABORATÓRIO</div>
            <div>
                <button onclick="setTheme('light')" style="background:none; border:none; cursor:pointer;">☀️</button>
                <button onclick="setTheme('dark')" style="background:none; border:none; cursor:pointer;">🌙</button>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <div class="tool-card" onclick="showPage('page-rescisao')">
            <span>⚖️</span>
            <h3>Consultor de Rescisão</h3>
            <p>Análise de verbas e parecer técnico.</p>
        </div>
        <div class="tool-card" onclick="showPage('page-ferias')">
            <span>🏖️</span>
            <h3>Calculadora de Férias</h3>
            <p>Melhor período e cálculos de 1/3 e abono.</p>
        </div>
    </div>

    <div id="page-rescisao" class="tool-page">
        <div class="back-btn" onclick="showPage('dashboard')">← Voltar</div>
        <div class="container">
            <h1>Consultoria de Rescisão</h1>
            <label>Motivo</label>
            <select id="motivo" onchange="toggleRescisaoExtras()">
                <option value="Demissão sem Justa Causa">Demissão sem Justa Causa</option>
                <option value="Pedido de Demissão">Pedido de Demissão</option>
            </select>
            <label>Salário (R$)</label>
            <input type="number" id="salario" placeholder="Ex: 2500">
            <label>Tempo (Meses)</label>
            <input type="number" id="meses" placeholder="Ex: 12">
            <button id="btnAnalisarRescisao" class="btn btn-primary" onclick="executarIA('rescisao')">GERAR ANÁLISE</button>
            <div id="res-rescisao" class="resultado-area"></div>
            <button id="pdf-rescisao" class="btn btn-pdf" onclick="gerarPDF('res-rescisao')">📄 BAIXAR PDF</button>
        </div>
    </div>

    <div id="page-ferias" class="tool-page">
        <div class="back-btn" onclick="showPage('dashboard')">← Voltar</div>
        <div class="container">
            <h1>Calculadora de Férias</h1>
            <label>Salário Bruto (R$)</label>
            <input type="number" id="salarioFerias" placeholder="Ex: 3000">
            <label>Dias de Descanso</label>
            <select id="diasFerias">
                <option value="30">30 dias</option>
                <option value="20">20 dias (Vender 10 dias)</option>
            </select>
            <label>Data Pretendida</label>
            <input type="date" id="dataInicio">
            <button id="btnAnalisarFerias" class="btn btn-primary" onclick="executarIA('ferias')">ANALISAR MELHOR PERÍODO</button>
            <div id="res-ferias" class="resultado-area"></div>
            <button id="pdf-ferias" class="btn btn-pdf" onclick="gerarPDF('res-ferias')">📄 BAIXAR PLANEJAMENTO</button>
        </div>
    </div>

    <script>
        function setTheme(theme) { document.body.setAttribute('data-theme', theme); }
        function showPage(p) { 
            document.querySelectorAll('.tool-page, #dashboard').forEach(div => div.style.display = 'none');
            document.getElementById(p).style.display = (p==='dashboard')?'grid':'block';
        }

        async function executarIA(tipo) {
            let prompt = "";
            let btn = "";
            let resDiv = "";
            let pdfBtn = "";

            if(tipo === 'rescisao') {
                btn = document.getElementById('btnAnalisarRescisao');
                resDiv = document.getElementById('res-rescisao');
                pdfBtn = document.getElementById('pdf-rescisao');
                prompt = `MODULO RESCISÃO: Motivo ${document.getElementById('motivo').value}, Salário R$ ${document.getElementById('salario').value}, Tempo ${document.getElementById('meses').value} meses.`;
            } else {
                btn = document.getElementById('btnAnalisarFerias');
                resDiv = document.getElementById('res-ferias');
                pdfBtn = document.getElementById('pdf-ferias');
                prompt = `MODULO FÉRIAS: Salário R$ ${document.getElementById('salarioFerias').value}, Dias: ${document.getElementById('diasFerias').value}, Início pretendido: ${document.getElementById('dataInicio').value}. Calcule e analise o melhor dia para começar conforme a CLT.`;
            }

            btn.innerText = "IA ANALISANDO..."; btn.disabled = true;

            try {
                const response = await fetch('/api/analise.js', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dados: prompt })
                });
                const data = await response.json();
                resDiv.innerHTML = marked.parse(data.resposta);
                resDiv.style.display = 'block';
                pdfBtn.style.display = 'block';
            } catch (e) { alert("Erro na análise."); }
            finally { btn.innerText = "CONCLUÍDO"; btn.disabled = false; }
        }

        function gerarPDF(id) {
            const content = document.getElementById(id).innerHTML;
            const folha = document.createElement('div');
            folha.style.padding = "20px"; folha.style.color = "#000"; folha.style.backgroundColor = "#fff";
            folha.innerHTML = `<div style="text-align:center;border-bottom:2px solid #1a365d;margin-bottom:20px;"><h1>LAI CONSULTORIA</h1></div>${content}`;
            html2pdf().set({ margin: 15, filename: 'LAI_Consultoria.pdf', html2canvas: { scale: 2, scrollY: 0 } }).from(folha).save();
        }
    </script>
</body>
</html>
