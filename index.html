<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAI - Consultoria de Rescisão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            /* TEMA CLARO - DEFINIÇÕES REAIS */
            --primary: #1a365d;
            --accent: #2b6cb0;
            --bg: #f7fafc;
            --card: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --input-bg: #ffffff;
            --border: #e2e8f0;
        }

        [data-theme="dark"] {
            /* TEMA ESCURO - DEFINIÇÕES REAIS */
            --primary: #90cdf4;
            --accent: #4299e1;
            --bg: #1a202c;
            --card: #2d3748;
            --text-main: #f7fafc;
            --text-muted: #a0aec0;
            --input-bg: #1a202c;
            --border: #4a5568;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* AJUSTE DO RÓTULO APARÊNCIA */
        .theme-selector {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .theme-label {
            font-size: 0.7em;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .theme-btn {
            padding: 6px 12px;
            font-size: 0.8em;
            cursor: pointer;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-main);
            transition: 0.2s;
        }

        .theme-btn:hover {
            border-color: var(--accent);
        }

        .container {
            width: 90%;
            max-width: 650px;
            background: var(--card);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        .header h1 { color: var(--primary); margin: 0; font-size: 1.8em; text-align: center; }
        .subtitle { color: var(--text-muted); text-align: center; margin-bottom: 30px; font-size: 0.9em; }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85em; color: var(--text-muted); }
        select, input {
            width: 100%; padding: 12px; margin-bottom: 20px;
            background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-main); box-sizing: border-box;
        }

        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        button { flex: 1; padding: 14px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        
        #btnAnalisar { background: var(--accent); color: white; }
        #btnReset { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        #btnPDF { background: #38a169; color: white; display: none; }

        #resultado {
            margin-top: 30px; padding: 20px; background: rgba(0,0,0,0.02);
            border-radius: 8px; border: 1px solid var(--border); display: none;
            white-space: pre-wrap; line-height: 1.6;
        }
        
        /* Estilo para o PDF */
        .pdf-export { background: white !important; color: black !important; padding: 30px !important; }
    </style>
</head>
<body>

    <div class="theme-selector">
        <span class="theme-label">APARÊNCIA</span>
        <button class="theme-btn" onclick="setTheme('light')">☀️</button>
        <button class="theme-btn" onclick="setTheme('dark')">🌙</button>
        <button class="theme-btn" onclick="setTheme('auto')">💻</button>
    </div>

    <div class="container">
        <div class="header">
            <h1>LAI - Consultoria</h1>
            <p class="subtitle">Análise Rescisória Inteligente</p>
        </div>

        <div class="form-group">
            <label>MOTIVO DA SAÍDA</label>
            <select id="motivo">
                <option value="Demissão sem Justa Causa">Demissão sem Justa Causa</option>
                <option value="Pedido de Demissão">Pedido de Demissão</option>
                <option value="Justa Causa">Justa Causa</option>
            </select>
        </div>

        <div class="form-group">
            <label>SALÁRIO BRUTO (R$)</label>
            <input type="number" id="salario" placeholder="Ex: 3000">
        </div>

        <div class="form-group">
            <label>TEMPO DE EMPRESA (MESES)</label>
            <input type="number" id="meses" placeholder="Ex: 12">
        </div>

        <div class="actions">
            <button id="btnAnalisar" onclick="analisar()">GERAR ANÁLISE</button>
            <button id="btnReset" onclick="resetar()">NOVA CONSULTA</button>
            <button id="btnPDF" onclick="gerarPDF()">BAIXAR PDF</button>
        </div>

        <div id="resultado"></div>
    </div>

    <script>
        function setTheme(theme) {
            const body = document.body;
            if (theme === 'auto') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                body.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            } else {
                body.setAttribute('data-theme', theme);
            }
            localStorage.setItem('lai-theme', theme);
        }

        // Inicializa o tema salvo
        setTheme(localStorage.getItem('lai-theme') || 'auto');

        async function analisar() {
            const btn = document.getElementById('btnAnalisar');
            const resDiv = document.getElementById('resultado');
            
            // Trava de Segurança: Desativa o botão por 30 segundos
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            try {
                const response = await fetch('/api/analise.js', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        dados: `Salário: ${document.getElementById('salario').value}, Meses: ${document.getElementById('meses').value}, Motivo: ${document.getElementById('motivo').value}` 
                    })
                });
                const data = await response.json();
                if (data.resposta) {
                    resDiv.innerHTML = "<strong>PARECER TÉCNICO:</strong>\n\n" + data.resposta;
                    resDiv.style.display = 'block';
                    document.getElementById('btnPDF').style.display = 'block';
                }
            } catch (e) {
                alert("Erro na conexão.");
            } finally {
                btn.innerText = "GERAR ANÁLISE";
                setTimeout(() => { btn.disabled = false; }, 30000); // Libera após 30s
            }
        }

        function resetar() {
            document.getElementById('salario').value = '';
            document.getElementById('meses').value = '';
            document.getElementById('resultado').style.display = 'none';
            document.getElementById('btnPDF').style.display = 'none';
        }

        function gerarPDF() {
            const elemento = document.getElementById('resultado');
            const clone = elemento.cloneNode(true);
            clone.classList.add('pdf-export');
            html2pdf().from(clone).save('Analise_LAI.pdf');
        }
    </script>
</body>
</html>
