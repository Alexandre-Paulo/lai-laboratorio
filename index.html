<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAI - Consultoria Inteligente</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root { --bg: #f7fafc; --card: #ffffff; --text: #2d3748; --title: #1a365d; --border: #e2e8f0; --accent: #2b6cb0; }
        [data-theme="dark"] { --bg: #1a202c; --card: #2d3748; --text: #f7fafc; --title: #90cdf4; --border: #4a5568; --accent: #4299e1; }

        body { 
            background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; transition: 0.3s;
        }
        
        .theme-bar { 
            margin-bottom: 20px; background: var(--card); padding: 10px 20px; border-radius: 50px; 
            border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .theme-btn { background: none; border: none; cursor: pointer; font-size: 1.3em; transition: 0.2s; }
        .theme-btn:hover { transform: scale(1.2); }

        .container { 
            width: 95%; max-width: 650px; background: var(--card); padding: 40px; border-radius: 24px; 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: var(--title); text-align: center; margin: 0; }
        .subtitle { text-align: center; color: #a0aec0; font-size: 0.9em; margin-bottom: 35px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85em; color: var(--accent); text-transform: uppercase; }
        input, select { 
            width: 100%; padding: 14px; margin-bottom: 25px; border-radius: 12px; 
            border: 1px solid var(--border); background: var(--bg); color: inherit; box-sizing: border-box; 
        }

        .btn-group { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-analisar { background: var(--accent); color: white; }
        .btn-reset { background: transparent; border: 1px solid var(--border); color: inherit; }
        .btn-pdf { background: #38a169; color: white; width: 100%; margin-top: 20px; display: none; }

        #resultado { 
            margin-top: 30px; padding: 30px; border: 1px solid var(--border); 
            display: none; line-height: 1.7; background: rgba(0,0,0,0.02); border-radius: 16px;
        }

        /* AJUSTE PARA O PDF: Força o conteúdo a ignorar margens do site na hora de "imprimir" */
        .pdf-print { 
            color: #000 !important; background: #fff !important; 
            padding: 0 !important; margin: 0 !important; border: none !important;
        }
        .pdf-print h1, .pdf-print h2, .pdf-print h3, .pdf-print strong { color: #000 !important; }
    </style>
</head>
<body data-theme="light">

    <div class="theme-bar">
        <span style="font-size: 0.75em; font-weight: bold; color: var(--accent);">APARÊNCIA:</span>
        <button class="theme-btn" onclick="setTheme('light')">☀️</button>
        <button class="theme-btn" onclick="setTheme('dark')">🌙</button>
    </div>

    <div class="container">
        <h1>LAI Consultoria</h1>
        <p class="subtitle">Análise Rescisória com IA</p>
        
        <label>Motivo</label>
        <select id="motivo">
            <option value="Demissão sem Justa Causa">Demissão sem Justa Causa</option>
            <option value="Pedido de Demissão">Pedido de Demissão</option>
            <option value="Justa Causa">Justa Causa</option>
        </select>

        <label>Salário Bruto (R$)</label>
        <input type="number" id="salario" placeholder="Ex: 3000">

        <label>Meses de Empresa</label>
        <input type="number" id="meses" placeholder="Ex: 12">

        <div class="btn-group">
            <button id="btnAnalisar" class="btn btn-analisar" onclick="analisar()">GERAR ANÁLISE</button>
            <button class="btn btn-reset" onclick="location.reload()">LIMPAR</button>
        </div>

        <div id="resultado"></div>
        <button id="btnPDF" class="btn btn-pdf" onclick="gerarPDF()">📄 BAIXAR PARECER EM PDF</button>
    </div>

    <script>
        function setTheme(theme) { document.body.setAttribute('data-theme', theme); }

        async function analisar() {
            const btn = document.getElementById('btnAnalisar');
            const resArea = document.getElementById('resultado');
            const pdfBtn = document.getElementById('btnPDF');
            btn.innerText = "ANALISANDO...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/analise.js', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        dados: `Salário: R$ ${document.getElementById('salario').value}, Meses: ${document.getElementById('meses').value}, Motivo: ${document.getElementById('motivo').value}` 
                    })
                });
                const data = await response.json();
                if (data.resposta) {
                    resArea.innerHTML = marked.parse(data.resposta);
                    resArea.style.display = 'block';
                    pdfBtn.style.display = 'block';
                    resArea.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (e) { alert("Erro de conexão."); } finally {
                btn.innerText = "GERAR ANÁLISE";
                btn.disabled = false;
            }
        }

        function gerarPDF() {
            const element = document.getElementById('resultado');
            element.classList.add('pdf-print');

            const opt = {
                margin: 10,
                filename: 'Parecer_Tecnico_LAI.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                // O SEGREDO: 'avoid-all' evita que o PDF crie páginas vazias no início
                pagebreak: { mode: 'avoid-all' },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.classList.remove('pdf-print');
            });
        }
    </script>
</body>
</html>
