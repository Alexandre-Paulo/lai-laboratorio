<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAI - Consultoria de Rescisão Inteligente</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #1a365d; /* Azul Marinho Profissional */
            --accent: #2b6cb0;
            --bg: #f7fafc;
            --card: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 20px;
        }

        h1 {
            color: var(--primary);
            font-size: 1.8em;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95em;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9em;
            color: var(--primary);
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            background: #fff;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1em;
            color: var(--text-main);
            box-sizing: border-box;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        #btnAnalisar {
            background-color: var(--primary);
            color: white;
        }

        #btnAnalisar:hover {
            background-color: var(--accent);
        }

        #btnPDF {
            background-color: #edf2f7;
            color: var(--primary);
            border: 1px solid #cbd5e0;
            display: none;
        }

        #btnPDF:hover {
            background-color: #e2e8f0;
        }

        #resultado {
            margin-top: 30px;
            padding: 25px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            line-height: 1.6;
            display: none;
            white-space: pre-wrap;
            font-size: 0.95em;
        }

        .loader {
            text-align: center;
            display: none;
            padding: 20px;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--accent);
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Classe especial para o PDF ficar perfeito */
        .pdf-mode {
            padding: 40px !important;
            background: white !important;
            font-size: 12pt !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>LAI - Laboratório de IA</h1>
        <div class="subtitle">Análise Especializada de Rescisão Contratual</div>
    </div>

    <div class="form-group">
        <label>Motivo do Desligamento</label>
        <select id="motivo">
            <option value="Demissão sem Justa Causa">Demissão sem Justa Causa</option>
            <option value="Pedido de Demissão">Pedido de Demissão</option>
            <option value="Justa Causa">Justa Causa</option>
            <option value="Rescisão Indireta">Rescisão Indireta</option>
        </select>
    </div>

    <div class="form-group">
        <label>Salário Bruto Mensal (R$)</label>
        <input type="number" id="salario" placeholder="Ex: 3000.00">
    </div>

    <div class="form-group">
        <label>Tempo de Empresa (Meses)</label>
        <input type="number" id="meses" placeholder="Ex: 12">
    </div>

    <div class="actions">
        <button id="btnAnalisar" onclick="analisar()">Gerar Análise</button>
        <button id="btnPDF" onclick="gerarPDF()">Baixar Relatório PDF</button>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p style="color: var(--accent); font-size: 0.9em;">Processando dados via Gemini 3...</p>
    </div>

    <div id="resultado"></div>
</div>

<script>
    async function analisar() {
        const motivo = document.getElementById('motivo').value;
        const salario = document.getElementById('salario').value;
        const meses = document.getElementById('meses').value;
        const resDiv = document.getElementById('resultado');
        const loader = document.getElementById('loader');
        const btnPDF = document.getElementById('btnPDF');

        if (!salario || !meses) {
            alert("Por favor, informe o salário e o tempo de empresa.");
            return;
        }

        resDiv.style.display = 'none';
        btnPDF.style.display = 'none';
        loader.style.display = 'block';

        const prompt = `Analise detalhadamente a rescisão: Motivo ${motivo}, Salário R$ ${salario}, Tempo ${meses} meses.`;

        try {
            const response = await fetch('/api/analise.js', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ dados: prompt })
            });

            const data = await response.json();
            
            if (data.resposta) {
                resDiv.innerHTML = "<strong>PARECER TÉCNICO:</strong>\n\n" + data.resposta;
                resDiv.style.display = 'block';
                btnPDF.style.display = 'block';
            } else {
                resDiv.innerText = "Erro no servidor: " + (data.error || "Inesperado");
                resDiv.style.display = 'block';
            }
        } catch (e) {
            resDiv.innerText = "Falha de conexão.";
            resDiv.style.display = 'block';
        } finally {
            loader.style.display = 'none';
        }
    }

    function gerarPDF() {
        const elemento = document.getElementById('resultado');
        const opt = {
            margin: 15,
            filename: 'Analise-Rescisao-LAI.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        const clone = elemento.cloneNode(true);
        clone.classList.add('pdf-mode');
        
        html2pdf().set(opt).from(clone).save();
    }
</script>

</body>
</html>
