<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAI - Consultoria</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* TEMA CLARO FORÇADO */
        :root, [data-theme="light"] {
            --cor-fundo: #f7fafc;
            --cor-card: #ffffff;
            --cor-texto: #2d3748;
            --cor-primaria: #1a365d;
            --cor-borda: #e2e8f0;
        }

        /* TEMA ESCURO FORÇADO */
        [data-theme="dark"] {
            --cor-fundo: #1a202c;
            --cor-card: #2d3748;
            --cor-texto: #f7fafc;
            --cor-primaria: #90cdf4;
            --cor-borda: #4a5568;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: 0.3s;
        }

        .config-bar {
            margin-bottom: 20px;
            background: var(--cor-card);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--cor-borda);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .config-label {
            font-size: 0.7em;
            font-weight: bold;
            color: var(--cor-primaria);
            letter-spacing: 1px;
        }

        .btn-tema {
            background: none;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 1.2em;
            padding: 5px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .btn-tema:hover {
            background: rgba(0,0,0,0.05);
            border-color: var(--cor-borda);
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--cor-card);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--cor-borda);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        h1 { color: var(--cor-primaria); text-align: center; margin-top: 0; }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            border-radius: 8px;
            border: 1px solid var(--cor-borda);
            background: var(--cor-fundo);
            color: var(--cor-texto);
            box-sizing: border-box;
        }

        .btn-principal {
            width: 100%;
            padding: 15px;
            background: #2b6cb0;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-principal:disabled { background: #a0aec0; }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            border: 1px dashed var(--cor-borda);
            display: none;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="config-bar">
        <span class="config-label">APARÊNCIA</span>
        <button class="btn-tema" onclick="mudarTema('light')">☀️</button>
        <button class="btn-tema" onclick="mudarTema('dark')">🌙</button>
        <button class="btn-tema" onclick="mudarTema('auto')">💻</button>
    </div>

    <div class="container">
        <h1>LAI Consultoria</h1>
        
        <label>Motivo</label>
        <select id="motivo">
            <option value="Demissão sem Justa Causa">Sem Justa Causa</option>
            <option value="Pedido de Demissão">Pedido de Demissão</option>
        </select>

        <label>Salário (R$)</label>
        <input type="number" id="salario" placeholder="3000">

        <label>Meses</label>
        <input type="number" id="meses" placeholder="12">

        <button id="btnAnalisar" class="btn-principal" onclick="executar()">GERAR ANÁLISE</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        function mudarTema(t) {
            const html = document.documentElement;
            if (t === 'auto') {
                const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                html.setAttribute('data-theme', dark ? 'dark' : 'light');
            } else {
                html.setAttribute('data-theme', t);
            }
            localStorage.setItem('tema-preferido', t);
        }

        // Aplicar tema ao carregar
        mudarTema(localStorage.getItem('tema-preferido') || 'auto');

        async function executar() {
            const btn = document.getElementById('btnAnalisar');
            const res = document.getElementById('resultado');
            
            btn.disabled = true;
            btn.innerText = "IA PROCESSANDO...";

            try {
                const response = await fetch('/api/analise.js', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        dados: `Salário: ${document.getElementById('salario').value}, Meses: ${document.getElementById('meses').value}, Motivo: ${document.getElementById('motivo').value}` 
                    })
                });
                const data = await response.json();
                res.innerHTML = data.resposta;
                res.style.display = 'block';
            } catch (e) {
                alert("Erro ao conectar.");
            } finally {
                btn.innerText = "GERAR ANÁLISE";
                setTimeout(() => btn.disabled = false, 5000);
            }
        }
    </script>
</body>
</html>
