<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAI - Consultoria</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* DEFINIÇÃO CLARA */
        body.tema-claro {
            background-color: #f7fafc !important;
            color: #2d3748 !important;
        }
        .tema-claro .container { background-color: #ffffff; border-color: #e2e8f0; color: #2d3748; }
        .tema-claro h1 { color: #1a365d; }
        .tema-claro .config-bar { background: #ffffff; border-color: #e2e8f0; }

        /* DEFINIÇÃO ESCURA */
        body.tema-escuro {
            background-color: #1a202c !important;
            color: #f7fafc !important;
        }
        .tema-escuro .container { background-color: #2d3748; border-color: #4a5568; color: #f7fafc; }
        .tema-escuro h1 { color: #90cdf4; }
        .tema-escuro .config-bar { background: #2d3748; border-color: #4a5568; }
        .tema-escuro input, .tema-escuro select { background: #1a202c; color: white; border-color: #4a5568; }

        /* ESTILOS GERAIS */
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: 0.2s;
        }
        .config-bar {
            margin-bottom: 20px;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .config-label { font-size: 0.7em; font-weight: bold; }
        .btn-tema { background: none; border: none; cursor: pointer; font-size: 1.2em; }
        .container {
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }
        input, select { width: 100%; padding: 12px; margin: 10px 0 20px 0; border-radius: 8px; box-sizing: border-box; }
        .btn-principal { width: 100%; padding: 15px; background: #2b6cb0; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #resultado { margin-top: 20px; padding: 15px; border: 1px dashed; display: none; white-space: pre-wrap; }
    </style>
</head>
<body class="tema-claro">

    <div class="config-bar">
        <span class="config-label">APARÊNCIA:</span>
        <button class="btn-tema" onclick="mudarPara('claro')">☀️</button>
        <button class="btn-tema" onclick="mudarPara('escuro')">🌙</button>
    </div>

    <div class="container">
        <h1>LAI Consultoria</h1>
        <label>Motivo</label>
        <select id="motivo">
            <option value="Demissão sem Justa Causa">Sem Justa Causa</option>
            <option value="Pedido de Demissão">Pedido de Demissão</option>
        </select>
        <label>Salário (R$)</label>
        <input type="number" id="salario" placeholder="3000">
        <label>Meses</label>
        <input type="number" id="meses" placeholder="12">
        <button class="btn-principal" onclick="executar()">GERAR ANÁLISE</button>
        <div id="resultado"></div>
    </div>

    <script>
        function mudarPara(tipo) {
            const b = document.body;
            if (tipo === 'claro') {
                b.classList.remove('tema-escuro');
                b.classList.add('tema-claro');
            } else {
                b.classList.remove('tema-claro');
                b.classList.add('tema-escuro');
            }
        }

        async function executar() {
            const res = document.getElementById('resultado');
            res.innerHTML = "Processando...";
            res.style.display = 'block';
            
            try {
                const response = await fetch('/api/analise.js', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        dados: `Salário: ${document.getElementById('salario').value}, Meses: ${document.getElementById('meses').value}, Motivo: ${document.getElementById('motivo').value}` 
                    })
                });
                const data = await response.json();
                res.innerHTML = data.resposta || "Erro na resposta";
            } catch (e) {
                res.innerHTML = "Erro de conexão.";
            }
        }
    </script>
</body>
</html>
