<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAI - Consultoria Inteligente</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root { --bg: #f7fafc; --card: #ffffff; --text: #2d3748; --title: #1a365d; --border: #e2e8f0; --accent: #2b6cb0; }
        [data-theme="dark"] { --bg: #1a202c; --card: #2d3748; --text: #f7fafc; --title: #90cdf4; --border: #4a5568; --accent: #4299e1; }

        body { 
            background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; transition: 0.3s;
        }
        
        .theme-bar { 
            margin-bottom: 20px; background: var(--card); padding: 10px 20px; border-radius: 50px; 
            border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .theme-btn { background: none; border: none; cursor: pointer; font-size: 1.3em; transition: 0.2s; }

        .container { 
            width: 95%; max-width: 650px; background: var(--card); padding: 40px; border-radius: 24px; 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: var(--title); text-align: center; margin: 0; }
        .subtitle { text-align: center; color: #a0aec0; font-size: 0.9em; margin-bottom: 30px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85em; color: var(--accent); text-transform: uppercase; }
        input, select { 
            width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; 
            border: 1px solid var(--border); background: var(--bg); color: inherit; box-sizing: border-box; font-size: 1em;
        }

        /* Área de Campos Dinâmicos */
        .hidden-fields { 
            display: none; background: rgba(43, 108, 176, 0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px dashed var(--accent);
        }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; cursor: pointer; }
        .checkbox-group input { width: auto; margin: 0; }

        .btn-group { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-analisar { background: var(--accent); color: white; }
        .btn-reset { background: transparent; border: 1px solid var(--border); color: inherit; }
        .btn-pdf { background: #38a169; color: white; width: 100%; margin-top: 20px; display: none; }

        #resultado { 
            margin-top: 30px; padding: 30px; border: 1px solid var(--border); 
            display: none; line-height: 1.7; background: rgba(0,0,0,0.02); border-radius: 16px;
        }
    </style>
</head>
<body data-theme="light">

    <div class="theme-bar">
        <span style="font-size: 0.75em; font-weight: bold; color: var(--accent);">APARÊNCIA:</span>
        <button class="theme-btn" onclick="setTheme('light')">☀️</button>
        <button class="theme-btn" onclick="setTheme('dark')">🌙</button>
    </div>

    <div class="container">
        <h1>LAI Consultoria</h1>
        <p class="subtitle">Análise Rescisória Inteligente (Versão 2.1)</p>
        
        <label>Motivo da Rescisão</label>
        <select id="motivo" onchange="toggleCamposExtras()">
            <option value="Demissão sem Justa Causa">Demissão sem Justa Causa</option>
            <option value="Pedido de Demissão">Pedido de Demissão</option>
            <option value="Justa Causa">Justa Causa</option>
            <option value="Acordo entre as Partes">Acordo entre as Partes</option>
        </select>

        <label>Salário Bruto Base (R$)</label>
        <input type="number" id="salario" placeholder="Ex: 2500">

        <div id="camposExtras" class="hidden-fields">
            <label>Média de Verbas Variáveis (R$)</label>
            <small style="display:block; margin-bottom:10px; color:#718096;">Comissões, Horas Extras, Adicionais</small>
            <input type="number" id="variaveis" placeholder="Ex: 450" value="0">

            <label class="checkbox-group">
                <input type="checkbox" id="experiencia" onchange="toggleAntecipada()"> 
                É Contrato de Experiência?
            </label>

            <div id="areaAntecipada" style="display:none; margin-left: 25px;">
                <label class="checkbox-group">
                    <input type="checkbox" id="antecipada"> Houve quebra antecipada?
                </label>
            </div>
        </div>

        <label>Tempo de Empresa (Meses)</label>
        <input type="number" id="meses" placeholder="Ex: 12">

        <div class="btn-group">
            <button id="btnAnalisar" class="btn btn-analisar" onclick="analisar()">GERAR ANÁLISE</button>
            <button class="btn btn-reset" onclick="location.reload()">LIMPAR</button>
        </div>

        <div id="resultado"></div>
        <button id="btnPDF" class="btn btn-pdf" onclick="gerarPDF()">📄 BAIXAR PARECER TÉCNICO (PDF)</button>
    </div>

    <script>
        function setTheme(theme) { document.body.setAttribute('data-theme', theme); }

        // Mostra/Esconde Verbas Variáveis e Experiência conforme o Motivo
        function toggleCamposExtras() {
            const motivo = document.getElementById('motivo').value;
            const extras = document.getElementById('camposExtras');
            // Só não mostramos extras em Justa Causa para manter o foco
            extras.style.display = (motivo === "Justa Causa") ? "none" : "block";
        }

        // Mostra opção de quebra antecipada apenas se for Experiência
        function toggleAntecipada() {
            const isExp = document.getElementById('experiencia').checked;
            document.getElementById('areaAntecipada').style.display = isExp ? "block" : "none";
        }

        async function analisar() {
            const btn = document.getElementById('btnAnalisar');
            const resArea = document.getElementById('resultado');
            const pdfBtn = document.getElementById('btnPDF');
            btn.innerText = "PROCESSANDO...";
            btn.disabled = true;

            // Coleta de dados avançada
            const dadosColetados = {
                motivo: document.getElementById('motivo').value,
                salario: document.getElementById('salario').value,
                meses: document.getElementById('meses').value,
                variaveis: document.getElementById('variaveis').value,
                isExperiencia: document.getElementById('experiencia').checked,
                isAntecipada: document.getElementById('antecipada').checked
            };

            try {
                const response = await fetch('/api/analise.js', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        dados: `Motivo: ${dadosColetados.motivo}, Salário Base: R$ ${dadosColetados.salario}, Média Variáveis: R$ ${dadosColetados.variaveis}, Tempo: ${dadosColetados.meses} meses, Contrato Experiência: ${dadosColetados.isExperiencia ? 'Sim' : 'Não'}, Quebra Antecipada: ${dadosColetados.isAntecipada ? 'Sim' : 'Não'}.` 
                    })
                });
                
                const data = await response.json();
                if (data.resposta) {
                    resArea.innerHTML = marked.parse(data.resposta);
                    resArea.style.display = 'block';
                    pdfBtn.style.display = 'block';
                    resArea.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (e) { alert("Erro de conexão."); } finally {
                btn.innerText = "GERAR ANÁLISE";
                btn.disabled = false;
            }
        }

        function gerarPDF() {
            const content = document.getElementById('resultado').innerHTML;
            const folha = document.createElement('div');
            folha.style.padding = "20px";
            folha.style.color = "#000";
            folha.style.backgroundColor = "#fff";
            folha.style.fontFamily = "Arial, sans-serif";

            folha.innerHTML = `
                <div style="text-align: center; border-bottom: 2px solid #1a365d; padding-bottom: 15px; margin-bottom: 25px;">
                    <h1 style="color: #1a365d; margin: 0; font-size: 20pt;">LAI Consultoria</h1>
                    <p style="color: #4a5568; margin: 5px 0; font-size: 10pt;">Parecer Técnico Rescisório Profissional</p>
                </div>
                <div style="line-height: 1.6; font-size: 11pt;">${content}</div>
                <div style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 10px; font-size: 9pt; color: #999; text-align: center;">
                    Documento gerado via IA - LAI Laboratório. Validar juridicamente.
                </div>
            `;

            html2pdf().set({
                margin: 15,
                filename: 'Parecer_Tecnico_LAI.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, scrollY: 0 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(folha).save();
        }
    </script>
</body>
</html>
