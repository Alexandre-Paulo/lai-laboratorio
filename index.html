<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAI - Consultoria</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body.light-mode { --bg: #f7fafc; --card: #ffffff; --text: #2d3748; --border: #e2e8f0; }
        body.dark-mode { --bg: #1a202c; --card: #2d3748; --text: #f7fafc; --border: #4a5568; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; transition: 0.3s; }
        .theme-bar { margin-bottom: 20px; background: var(--card); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .theme-btn { background: none; border: none; cursor: pointer; font-size: 1.3em; }
        .container { width: 90%; max-width: 500px; background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2b6cb0; }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: inherit; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-analisar { background: #2b6cb0; color: white; }
        .btn-reset { background: transparent; border: 1px solid var(--border); color: inherit; }
        #resultado { margin-top: 25px; padding: 20px; border: 1px dashed var(--border); display: none; white-space: pre-wrap; }
    </style>
</head>
<body class="light-mode">
    <div class="theme-bar">
        <span style="font-size: 0.7em; font-weight: bold;">APARÊNCIA:</span>
        <button class="theme-btn" onclick="mudarTema('light')">☀️</button>
        <button class="theme-btn" onclick="mudarTema('dark')">🌙</button>
    </div>
    <div class="container">
        <h1>LAI Consultoria</h1>
        <input type="number" id="salario" placeholder="Salário Bruto (R$)">
        <input type="number" id="meses" placeholder="Meses de Empresa">
        <select id="motivo">
            <option value="Demissão sem Justa Causa">Sem Justa Causa</option>
            <option value="Pedido de Demissão">Pedido de Demissão</option>
            <option value="Justa Causa">Justa Causa</option>
        </select>
        <div class="btn-group">
            <button id="btnAnalisar" class="btn btn-analisar" onclick="analisar()">Gerar Análise</button>
            <button class="btn btn-reset" onclick="location.reload()">Nova Consulta</button>
        </div>
        <div id="resultado"></div>
    </div>
    <script>
        function mudarTema(m) { document.body.className = m + '-mode'; }
        async function analisar() {
            const btn = document.getElementById('btnAnalisar');
            btn.innerText = "PROCESSANDO...";
            try {
                // MUDAMOS A ROTA PARA CONSULTAR.JS
                const response = await fetch('/api/consultar.js', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dados: `Salário: ${document.getElementById('salario').value}, Meses: ${document.getElementById('meses').value}, Motivo: ${document.getElementById('motivo').value}` })
                });
                const data = await response.json();
                if (data.resposta) {
                    const res = document.getElementById('resultado');
                    res.innerHTML = data.resposta;
                    res.style.display = 'block';
                } else { alert("Erro: " + (data.error || "IA indisponível")); }
            } catch (e) { alert("Erro de conexão."); }
            finally { btn.innerText = "GERAR ANÁLISE"; }
        }
    </script>
</body>
</html>
