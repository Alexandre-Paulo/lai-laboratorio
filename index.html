<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAI - Consultoria de Rescisão Inteligente</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            /* Tema Claro (Padrão) */
            --primary: #1a365d;
            --accent: #2b6cb0;
            --bg: #f7fafc;
            --card: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --input-bg: #ffffff;
            --border: #e2e8f0;
        }

        /* Tema Escuro */
        [data-theme="dark"] {
            --primary: #63b3ed;
            --accent: #4299e1;
            --bg: #1a202c;
            --card: #2d3748;
            --text-main: #f7fafc;
            --text-muted: #a0aec0;
            --input-bg: #1a202c;
            --border: #4a5568;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        .theme-selector {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            padding: 5px 10px;
            font-size: 0.8em;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
        }

        h1 {
            color: var(--primary);
            font-size: 1.8em;
            margin: 0;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9em;
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1em;
            color: var(--text-main);
            box-sizing: border-box;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            min-width: 140px;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }

        #btnAnalisar { background-color: #2b6cb0; color: white; }
        #btnReset { background-color: #e53e3e; color: white; }
        #btnPDF { background-color: #4a5568; color: white; display: none; }

        button:hover { opacity: 0.8; }

        #resultado {
            margin-top: 30px;
            padding: 25px;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            display: none;
            white-space: pre-wrap;
        }

        .loader { text-align: center; display: none; padding: 20px; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border-left-color: var(--accent);
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media print { .theme-selector, .actions, .header { display: none; } }
    </style>
</head>
<body data-theme="auto">

    <div class="theme-selector">
        <button class="theme-btn" onclick="setTheme('light')">☀️ Claro</button>
        <button class="theme-btn" onclick="setTheme('dark')">🌙 Escuro</button>
        <button class="theme-btn" onclick="setTheme('auto')">💻 Auto</button>
    </div>

    <div class="container">
        <div class="header">
            <h1>LAI - Consultoria de Rescisão</h1>
            <p class="subtitle">Análise Técnica Inteligente</p>
        </div>

        <form id="rescisaoForm">
            <div class="form-group">
                <label>Motivo do Desligamento</label>
                <select id="motivo">
                    <option value="Demissão sem Justa Causa">Demissão sem Justa Causa</option>
                    <option value="Pedido de Demissão">Pedido de Demissão</option>
                    <option value="Justa Causa">Justa Causa</option>
                </select>
            </div>

            <div class="form-group">
                <label>Salário Bruto Mensal (R$)</label>
                <input type="number" id="salario" placeholder="Ex: 3500">
            </div>

            <div class="form-group">
                <label>Tempo de Empresa (Meses)</label>
                <input type="number" id="meses" placeholder="Ex: 12">
            </div>
        </form>

        <div class="actions">
            <button id="btnAnalisar" onclick="analisar()">Gerar Análise</button>
            <button id="btnReset" onclick="resetar()">Nova Consulta</button>
            <button id="btnPDF" onclick="gerarPDF()">Baixar PDF</button>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Processando via IA...</p>
        </div>

        <div id="resultado"></div>
    </div>

<script>
    // Gerenciamento de Temas
    function setTheme(theme) {
        if (theme === 'auto') {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.body.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
        } else {
            document.body.setAttribute('data-theme', theme);
        }
        localStorage.setItem('user-theme', theme);
    }

    // Carregar preferência salva
    const savedTheme = localStorage.getItem('user-theme') || 'auto';
    setTheme(savedTheme);

    async function analisar() {
        const motivo = document.getElementById('motivo').value;
        const salario = document.getElementById('salario').value;
        const meses = document.getElementById('meses').value;
        const resDiv = document.getElementById('resultado');
        const loader = document.getElementById('loader');
        const btnPDF = document.getElementById('btnPDF');

        if (!salario || !meses) {
            alert("Preencha todos os campos.");
            return;
        }

        resDiv.style.display = 'none';
        btnPDF.style.display = 'none';
        loader.style.display = 'block';

        try {
            const response = await fetch('/api/analise.js', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ dados: `Motivo: ${motivo}, Salário: ${salario}, Tempo: ${meses} meses.` })
            });
            const data = await response.json();
            if (data.resposta) {
                resDiv.innerHTML = "<strong>PARECER TÉCNICO:</strong>\n\n" + data.resposta;
                resDiv.style.display = 'block';
                btnPDF.style.display = 'block';
            }
        } catch (e) {
            alert("Erro na conexão.");
        } finally {
            loader.style.display = 'none';
        }
    }

    function resetar() {
        document.getElementById('rescisaoForm').reset();
        document.getElementById('resultado').style.display = 'none';
        document.getElementById('btnPDF').style.display = 'none';
    }

    function gerarPDF() {
        const elemento = document.getElementById('resultado');
        const opt = {
            margin: 10,
            filename: 'Analise_Rescisao_LAI.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        // Forçar fundo branco no PDF para economia de tinta e legibilidade
        const clone = elemento.cloneNode(true);
        clone.style.color = "black";
        clone.style.background = "white";
        clone.style.padding = "20px";
        html2pdf().set(opt).from(clone).save();
    }
</script>
</body>
</html>
